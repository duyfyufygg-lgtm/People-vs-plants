<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>คนปะทะพืช: สมรภูมิแฟนตาซี (อัลติเฉพาะตัวละคร)</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #1e272e; color: #fff; font-family: 'Tahoma', sans-serif; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        /* เมนูหลัก */
        #mainMenu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1c3628 0%, #060e0a 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .game-logo { font-size: 65px; font-weight: bold; color: #fff; text-shadow: 0 0 10px #2ecc71, 0 0 20px #27ae60, 4px 4px 0px #000; margin-bottom: 40px; text-align: center; letter-spacing: 2px; animation: floatLogo 2s ease-in-out infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .epic-btn { background: linear-gradient(180deg, #135d58 0%, #0a3330 100%); border: 2px solid #3de0ba; color: #fff; font-family: 'Tahoma', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); box-shadow: 0 0 15px rgba(61, 224, 186, 0.4), inset 0 0 15px rgba(0,0,0,0.6); cursor: pointer; transition: transform 0.1s; }
        .epic-btn:active { transform: scale(0.92); }
        .play-btn { font-size: 36px; font-weight: bold; padding: 15px 80px; clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0 50%); }
        /* เลือกความยาก */
        #difficultyMenu { display: none; flex-direction: column; gap: 12px; align-items: center; }
        #difficultyMenu h2 { font-size: 26px; margin-bottom: 5px; text-shadow: 2px 2px 4px #000; }
        .diff-btn { font-size: 20px; font-weight: bold; padding: 12px 50px; width: 280px; border-radius: 10px; border: 3px solid #fff; color: white; cursor: pointer; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .btn-easy { background: linear-gradient(180deg, #2ecc71, #27ae60); }
        .btn-normal { background: linear-gradient(180deg, #f1c40f, #f39c12); }
        .btn-hard { background: linear-gradient(180deg, #e74c3c, #c0392b); }
        .btn-hardcore { background: linear-gradient(180deg, #9b59b6, #8e44ad); }
        .bottom-ui-bar { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; }
        .side-btn { font-size: 20px; font-weight: bold; padding: 10px 30px; clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 10px 100%, 0 50%); }
        /* ตั้งค่า */
        #settingsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); flex-direction: column; justify-content: center; align-items: center; z-index: 150; }
        .settings-box { background: #2f3542; border: 4px solid #3de0ba; border-radius: 15px; padding: 30px; width: 300px; text-align: center; box-shadow: 0 0 30px rgba(61, 224, 186, 0.5); }
        .settings-box h2 { margin-top: 0; color: #f1c40f; }
        .setting-item { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; align-items: center; font-size: 18px;}
        .close-settings-btn { background: #e74c3c; border: 2px solid #fff; color: white; padding: 10px 20px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        /* UI เกม */
        #skinSelector { display: flex; gap: 10px; margin-bottom: 10px; background: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 20px; border: 2px solid #57606f; z-index: 40; }
        .skin-btn { background-color: #2f3542; color: white; border: 2px solid #747d8c; padding: 6px 12px; font-size: 14px; font-weight: bold; border-radius: 15px; cursor: pointer; transition: all 0.2s; }
        .skin-btn.active { background-color: #f1c40f; color: #2f3542; border-color: #fff; transform: scale(1.05); box-shadow: 0 0 10px #f1c40f; }
        #gameContainer { position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 4px solid #8B4513; border-radius: 10px; background-color: #7bed9f; overflow: hidden; max-width: 100vw; max-height: 60vh; }
        canvas { display: block; width: 100%; height: auto; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; width: calc(100% - 20px); display: flex; justify-content: space-between; z-index: 10; }
        .ui-element { background: rgba(0, 0, 0, 0.6); padding: 5px 12px; border-radius: 8px; font-size: 18px; font-weight: bold; border: 2px solid #fff; }
        #ultNotice { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(241, 196, 15, 0.85); color: black; padding: 5px 20px; font-weight: bold; border-radius: 20px; display: none; font-size: 20px; text-shadow: 1px 1px 0 rgba(255,255,255,0.5); box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index: 15; white-space: nowrap; }
        /* ปุ่มควบคุม */
        #mobileControls { display: flex; justify-content: space-between; width: 100%; max-width: 800px; padding: 10px 15px; box-sizing: border-box; z-index: 30; }
        .control-group { display: flex; gap: 10px; }
        .btn { width: 65px; height: 65px; background-color: rgba(255, 255, 255, 0.2); border: 3px solid #fff; border-radius: 50%; color: white; font-size: 24px; font-weight: bold; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); touch-action: manipulation; }
        .btn:active { background-color: rgba(255, 255, 255, 0.5); transform: scale(0.92); }
        #btnShoot { background-color: #ff4757; width: 75px; height: 75px; font-size: 20px; }
        #btnUlt { background-color: #f1c40f; width: 75px; height: 75px; font-size: 16px; border-color: #f39c12; color: #2c3e50; box-shadow: 0 0 15px #f1c40f; }
        #btnUlt.disabled { background-color: #7f8c8d; border-color: #95a5a6; color: #bdc3c7; box-shadow: none; pointer-events: none; filter: grayscale(100%); }
        /* หน้าจอแพ้ */
        #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        #gameOverScreen h1 { font-size: 40px; color: #ff4757; margin-bottom: 10px; text-shadow: 2px 2px 0 #000; }
        #restartButton { background-color: #2ed573; color: white; border: 3px solid #fff; padding: 12px 30px; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="settingsModal">
        <div class="settings-box">
            <h2>⚙️ ตั้งค่าเกม</h2>
            <div class="setting-item">
                <label><input type="checkbox" id="soundToggle" checked style="transform: scale(1.5); margin-right: 10px;">เปิดเสียงเกม (Sound)</label>
            </div>
            <div class="setting-item">
                <label>ระดับเสียง (Volume)</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" style="width: 100%;">
            </div>
            <button class="close-settings-btn" onclick="closeSettings()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <div id="mainMenu">
        <div class="game-logo">คนปะทะพืช</div>
        <button id="initialPlayBtn" class="epic-btn play-btn" onclick="initAudio(); showDifficultyOptions();">เข้าเล่นเกม</button>
        <div id="difficultyMenu">
            <h2>เลือกความยากก่อนเข้าสนามรบ</h2>
            <button class="diff-btn btn-easy" onclick="selectDifficulty('easy')">1. ง่าย (สีเขียว)</button>
            <button class="diff-btn btn-normal" onclick="selectDifficulty('normal')">2. ปานกลาง (สีเหลือง)</button>
            <button class="diff-btn btn-hard" onclick="selectDifficulty('hard')">3. ยาก (สีแดง)</button>
            <button class="diff-btn btn-hardcore" onclick="selectDifficulty('hardcore')">4. ฮาร์ดคอร์ (สีม่วง)</button>
        </div>
        <div class="bottom-ui-bar">
            <button class="epic-btn side-btn" onclick="openSettings()">ตั้งค่า</button>
            <button class="epic-btn side-btn" onclick="alert('ประวัติศาสตร์ยังไม่มีบันทึกในตอนนี้!')">ประวัติศาสตร์</button>
        </div>
    </div>

    <div id="skinSelector">
        <button class="skin-btn active" onclick="changeSkin('farmer')">🧑‍🌾 ชาวสวน</button>
        <button class="skin-btn" onclick="changeSkin('robot')">🤖 ไซบอร์ก</button>
        <button class="skin-btn" onclick="changeSkin('wizard')">🧙‍♂️ พ่อมด</button>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="ui">
            <div id="score" class="ui-element">คะแนน: 0</div>
            <div id="baseHealth" class="ui-element">พลังฐาน: 10</div>
        </div>
        <div id="ultNotice">💥 ปล่อยอัลติเมท!</div>
        <div id="gameOverScreen">
            <h1>พืชยึดบ้านแล้ว!</h1>
            <p id="finalScoreDisplay" style="font-size: 20px;">คะแนนสุดท้าย: 0</p>
            <button id="restartButton" onclick="backToMenu()">กลับหน้าแรก</button>
        </div>
    </div>

    <div id="mobileControls">
        <div class="control-group">
            <div id="btnUp" class="btn">🔼</div>
            <div id="btnDown" class="btn">🔽</div>
        </div>
        <div class="control-group">
            <div id="btnUlt" class="btn">💥อัลติ</div>
            <div id="btnShoot" class="btn">🔥ยิง</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiScore = document.getElementById('score');
        const uiHealth = document.getElementById('baseHealth');
        const ultNotice = document.getElementById('ultNotice');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScoreDisplay');
        const mainMenu = document.getElementById('mainMenu');
        const initialPlayBtn = document.getElementById('initialPlayBtn');
        const difficultyMenu = document.getElementById('difficultyMenu');
        const btnUlt = document.getElementById('btnUlt');

        // --- ระบบเสียง ---
        let audioCtx, masterGain;
        let isSoundEnabled = true;
        document.getElementById('soundToggle').addEventListener('change', (e) => isSoundEnabled = e.target.checked);
        document.getElementById('volumeSlider').addEventListener('input', (e) => { if (masterGain) masterGain.gain.value = e.target.value; });

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!isSoundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(masterGain);
            const now = audioCtx.currentTime;
            if (type === 'shoot') {
                osc.type = 'square'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            } else if (type === 'hit') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'ult') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now); osc.frequency.linearRampToValueAtTime(600, now + 0.4);
                osc.frequency.exponentialRampToValueAtTime(40, now + 1.2); gain.gain.setValueAtTime(0.6, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                osc.start(now); osc.stop(now + 1.2);
            }
        }

        const settingsModal = document.getElementById('settingsModal');
        function openSettings() { settingsModal.style.display = 'flex'; }
        function closeSettings() { settingsModal.style.display = 'none'; }

        // --- ตัวแปรหลัก ---
        const GAME_WIDTH = canvas.width; const GAME_HEIGHT = canvas.height;
        let score = 0; let baseHealth = 10; let isGameOver = true; let frames = 0;
        let plants = []; let bullets = []; let particles = []; let shockwaves = [];
        let spawnRate = 100; let plantSpeedModifier = 1.0; let globalHpMultiplier = 1;
        let currentSkin = 'farmer'; let hasUsedUlt = false;
        const moveState = { up: false, down: false };

        const PLANT_DICTIONARY = {
            normal:  { color: '#2ecc71', hp: 2,  speed: 1.1, size: 1.0 },
            armor:   { color: '#e67e22', hp: 6,  speed: 0.6, size: 1.2 },
            speedy:  { color: '#9b59b6', hp: 1,  speed: 2.3, size: 0.8 },
            giant:   { color: '#e74c3c', hp: 14, speed: 0.4, size: 1.7 }
        };

        function showDifficultyOptions() { initialPlayBtn.style.display = 'none'; difficultyMenu.style.display = 'flex'; }
        function selectDifficulty(mode) {
            if (mode === 'easy') { spawnRate = 120; plantSpeedModifier = 0.8; globalHpMultiplier = 1; } 
            else if (mode === 'normal') { spawnRate = 95; plantSpeedModifier = 1.1; globalHpMultiplier = 1; } 
            else if (mode === 'hard') { spawnRate = 70;  plantSpeedModifier = 1.5; globalHpMultiplier = 1.5; } 
            else if (mode === 'hardcore') { spawnRate = 40;  plantSpeedModifier = 2.0; globalHpMultiplier = 2.5; }
            mainMenu.style.display = 'none'; resetGame(); 
        }
        function backToMenu() { gameOverScreen.style.display = 'none'; difficultyMenu.style.display = 'none'; initialPlayBtn.style.display = 'block'; mainMenu.style.display = 'flex'; isGameOver = true; }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') moveState.up = true;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') moveState.down = true;
            if (e.code === 'Space' && !isGameOver) { shoot(); e.preventDefault(); }
            if ((e.code === 'KeyQ' || e.code === 'Enter') && !isGameOver) { useUltimate(); e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') moveState.up = false;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') moveState.down = false;
        });

        const btnUp = document.getElementById('btnUp'); const btnDown = document.getElementById('btnDown'); const btnShoot = document.getElementById('btnShoot'); 
        function bindTouch(el, s, e) { el.addEventListener('touchstart', (ev)=>{ev.preventDefault(); s();}, {passive:false}); el.addEventListener('touchend', (ev)=>{ev.preventDefault(); e();}, {passive:false}); el.addEventListener('mousedown', s); el.addEventListener('mouseup', e); }
        bindTouch(btnUp, () => moveState.up = true, () => moveState.up = false); bindTouch(btnDown, () => moveState.down = true, () => moveState.down = false);
        bindTouch(btnShoot, () => { if (!isGameOver) shoot(); }, () => {}); bindTouch(btnUlt, () => { if (!isGameOver) useUltimate(); }, () => {});

        function changeSkin(skinName) { currentSkin = skinName; const buttons = document.querySelectorAll('.skin-btn'); buttons.forEach(btn => btn.classList.remove('active')); if(skinName === 'farmer') buttons[0].classList.add('active'); if(skinName === 'robot') buttons[1].classList.add('active'); if(skinName === 'wizard') buttons[2].classList.add('active'); }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 8; this.speedY = (Math.random() - 0.5) * 8;
                this.life = 1.0; this.decay = Math.random() * 0.06 + 0.03;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= this.decay; }
            draw() { ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
        }

        function createExplosion(x, y, color, count = 8) {
            if (particles.length > 100) return;
            for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
        }

        class Human {
            constructor() { this.x = 40; this.y = GAME_HEIGHT / 2 - 30; this.width = 50; this.height = 60; this.speed = 6; this.recoil = 0; }
            update() {
                if (moveState.up) this.y -= this.speed; if (moveState.down) this.y += this.speed;
                if (this.y < 0) this.y = 0; if (this.y > GAME_HEIGHT - this.height) this.y = GAME_HEIGHT - this.height;
                if (this.recoil > 0) this.recoil -= 3;
            }
            draw() {
                ctx.save(); let bounce = Math.sin(frames * 0.12) * 3; ctx.translate(this.x - this.recoil, this.y + bounce);
                if (currentSkin === 'farmer') {
                    ctx.fillStyle = '#95a5a6'; ctx.fillRect(25, 30, 40, 10); ctx.fillStyle = '#3498db'; ctx.fillRect(60, 28, 10, 14);
                    ctx.fillStyle = '#2980b9'; ctx.beginPath(); ctx.roundRect(10, 20, 30, 40, 5); ctx.fill();
                    ctx.fillStyle = '#f1c27d'; ctx.beginPath(); ctx.arc(25, 15, 18, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(32, 12, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#f39c12'; ctx.beginPath(); ctx.ellipse(25, 0, 25, 8, 0, 0, Math.PI * 2); ctx.fill();
                } else if (currentSkin === 'robot') {
                    ctx.fillStyle = '#718093'; ctx.fillRect(20, 25, 45, 15); ctx.fillStyle = '#e84118'; ctx.fillRect(65, 22, 8, 21);
                    ctx.fillStyle = '#dcdde1'; ctx.beginPath(); ctx.roundRect(8, 18, 34, 42, 4); ctx.fill();
                    ctx.fillStyle = '#718093'; ctx.fillRect(13, -2, 24, 20); ctx.fillStyle = '#ff4757'; ctx.fillRect(26, 4, 10, 4);
                } else if (currentSkin === 'wizard') {
                    ctx.fillStyle = '#4a235a'; ctx.fillRect(30, 5, 8, 55); ctx.fillStyle = '#9b59b6'; ctx.beginPath(); ctx.arc(34, 2, 8, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#341f97'; ctx.beginPath(); ctx.moveTo(25, 20); ctx.lineTo(5, 60); ctx.lineTo(45, 60); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#f3a683'; ctx.beginPath(); ctx.arc(25, 15, 12, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#1e0d5e'; ctx.beginPath(); ctx.ellipse(25, 8, 20, 5, 0, 0, Math.PI*2); ctx.fill(); 
                    ctx.beginPath(); ctx.moveTo(12, 6); ctx.lineTo(25, -18); ctx.lineTo(38, 6); ctx.closePath(); ctx.fill();
                }
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, skinType) {
                this.x = x + 65; this.y = y + 30; this.skinType = skinType;
                this.width = (skinType === 'robot') ? 25 : 15; this.height = (skinType === 'robot') ? 6 : 10;
                this.speed = (skinType === 'robot') ? 16 : (skinType === 'farmer' ? 12 : 9);
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                if (this.skinType === 'farmer') { ctx.fillStyle = '#7efff5'; ctx.beginPath(); ctx.arc(5, 5, 6, 0, Math.PI * 2); ctx.fill(); } 
                else if (this.skinType === 'robot') { ctx.fillStyle = '#ff3838'; ctx.fillRect(0, 0, this.width, this.height); } 
                else if (this.skinType === 'wizard') { ctx.rotate(frames * 0.2); ctx.fillStyle = '#be2edd'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill(); }
                ctx.restore();
            }
            update() { this.x += this.speed; }
        }

        class Plant {
            constructor() {
                const types = ['normal', 'normal', 'armor', 'speedy', 'giant'];
                const selectedType = types[Math.floor(Math.random() * types.length)];
                const config = PLANT_DICTIONARY[selectedType];
                this.color = config.color; this.maxHealth = Math.round(config.hp * globalHpMultiplier);
                this.health = this.maxHealth; this.speed = (Math.random() * 0.5 + config.speed) * plantSpeedModifier;
                this.sizeFactor = config.size; this.width = 40 * this.sizeFactor; this.height = 50 * this.sizeFactor;
                this.x = GAME_WIDTH + this.width; this.y = Math.random() * (GAME_HEIGHT - this.height - 50) + 25;
                this.wobbleOffset = Math.random() * 10; this.hitTimer = 0;
            }
            draw() {
                ctx.save(); let wobbleY = Math.sin(frames * 0.18 + this.wobbleOffset) * 4;
                ctx.translate(this.x, this.y + wobbleY); ctx.scale(this.sizeFactor, this.sizeFactor);
                if (this.hitTimer > 0) { ctx.filter = 'brightness(250%)'; }
                ctx.fillStyle = this.color; ctx.fillRect(15, 20, 10, 30);
                ctx.fillStyle = '#27ae60'; ctx.beginPath(); ctx.ellipse(5, 35, 12, 5, Math.PI/4, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(35, 35, 12, 5, -Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff4757'; ctx.beginPath();
                let mouthOpen = (Math.sin(frames * 0.25 + this.wobbleOffset) * 0.25) + 0.25; 
                ctx.arc(20, 15, 18, Math.PI + mouthOpen, Math.PI - mouthOpen, false); ctx.lineTo(20, 15); ctx.fill();
                ctx.filter = 'none'; ctx.fillStyle = 'red'; ctx.fillRect(5, -10, 30, 4);
                ctx.fillStyle = 'lightgreen'; ctx.fillRect(5, -10, (30 / this.maxHealth) * this.health, 4);
                ctx.restore();
            }
            update() { this.x -= this.speed; if (this.hitTimer > 0) this.hitTimer--; }
        }

        const human = new Human();

        function shoot() {
            playSound('shoot'); human.recoil = 12; bullets.push(new Bullet(human.x, human.y, currentSkin));
            createExplosion(human.x + 70, human.y + 35, '#f1c40f', 3);
        }

        // --- ระบบอัลติเมทผูกกับตัวละคร ---
        function useUltimate() {
            if (hasUsedUlt || isGameOver) return;
            hasUsedUlt = true; btnUlt.classList.add('disabled'); playSound('ult');

            let ultName = "", ultColor = "", particleColor = "";

            // แยกท่าไม้ตายตามตัวละคร
            if (currentSkin === 'farmer') {
                ultName = '🌪️ พายุเคียวเกี่ยวข้าว!';
                ultColor = '#f1c40f'; // สีทอง
                particleColor = '#27ae60'; // กระจายเศษใบไม้เขียว
            } else if (currentSkin === 'robot') {
                ultName = '⚡ ล้างบางด้วยคลื่น EMP!';
                ultColor = '#00d2d3'; // สีฟ้าไซเบอร์
                particleColor = '#ffffff'; // กระจายประกายไฟสีขาว
            } else if (currentSkin === 'wizard') {
                ultName = '🔥 มหาเวทอุกกาบาต!';
                ultColor = '#e74c3c'; // สีแดงเพลิง
                particleColor = '#f39c12'; // กระจายเปลวไฟสีส้ม
            }
            
            // อัปเดตป้ายแจ้งเตือน
            ultNotice.innerText = ultName;
            ultNotice.style.background = ultColor;
            ultNotice.style.color = (currentSkin === 'farmer' || currentSkin === 'robot') ? 'black' : 'white';
            ultNotice.style.display = 'block';
            setTimeout(() => { ultNotice.style.display = 'none'; }, 2000);

            // ปล่อยคลื่นสีตามท่าไม้ตาย
            shockwaves.push({ radius: 0, maxRadius: 600, alpha: 1.0, color: ultColor });

            // ทำลายศัตรูพร้อมสาดเอฟเฟกต์สีเฉพาะตัว
            score += plants.length * 10;
            for (let i = 0; i < plants.length; i++) {
                createExplosion(plants[i].x + 20, plants[i].y + 25, particleColor, 10);
            }
            plants = []; updateUI();
        }

        function isColliding(b, p) { return b.x < p.x + p.width && b.x + b.width > p.x && b.y < p.y + p.height && b.y + b.height > p.y; }

        function drawBackground() {
            ctx.fillStyle = '#2ed573'; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT); ctx.fillStyle = '#26de81';
            let offset = (frames * 2) % 80;
            for(let i = -80; i < GAME_WIDTH + 80; i += 80) { ctx.fillRect(i - offset, 0, 40, GAME_HEIGHT); }
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; ctx.fillRect(0, 0, 100, GAME_HEIGHT);
        }

        function gameLoop() {
            if (isGameOver) return; frames++; let uiNeedsUpdate = false;
            drawBackground(); human.update(); human.draw();

            for (let i = shockwaves.length - 1; i >= 0; i--) {
                let sw = shockwaves[i]; ctx.beginPath(); ctx.arc(human.x + 25, human.y + 30, sw.radius, 0, Math.PI * 2);
                ctx.lineWidth = 20; ctx.strokeStyle = sw.color; ctx.save(); ctx.globalAlpha = sw.alpha; ctx.stroke(); ctx.restore();
                sw.radius += 25; sw.alpha -= 0.04; if (sw.alpha <= 0 || sw.radius >= sw.maxRadius) shockwaves.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw(); if (particles[i].life <= 0) particles.splice(i, 1);
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update(); bullets[i].draw();
                if (bullets[i].x > GAME_WIDTH) { bullets.splice(i, 1); continue; }
                for (let j = plants.length - 1; j >= 0; j--) {
                    if (isColliding(bullets[i], plants[j])) {
                        plants[j].health -= 1; plants[j].hitTimer = 4; createExplosion(bullets[i].x, bullets[i].y, '#ffffff', 3); bullets.splice(i, 1);
                        if (plants[j].health <= 0) {
                            playSound('hit'); createExplosion(plants[j].x + (plants[j].width/2), plants[j].y + (plants[j].height/2), plants[j].color, 7);
                            plants.splice(j, 1); score += 10; uiNeedsUpdate = true;
                        }
                        break;
                    }
                }
            }

            for (let j = plants.length - 1; j >= 0; j--) {
                plants[j].update(); plants[j].draw();
                if (plants[j].x < 100) {
                    baseHealth -= 1; playSound('hit'); uiNeedsUpdate = true; createExplosion(plants[j].x, plants[j].y + 20, '#c0392b', 8); plants.splice(j, 1);
                    if (baseHealth <= 0) { endGame(); return; }
                }
            }

            if (frames % spawnRate === 0) { plants.push(new Plant()); }
            if (uiNeedsUpdate) updateUI(); requestAnimationFrame(gameLoop);
        }

        function updateUI() { uiScore.innerText = `คะแนน: ${score}`; uiHealth.innerText = `พลังฐาน: ${baseHealth}`; }
        function endGame() { isGameOver = true; gameOverScreen.style.display = 'flex'; finalScoreDisplay.innerText = `คะแนนที่คุณทำได้: ${score}`; }
        function resetGame() {
            score = 0; baseHealth = 10; isGameOver = false; frames = 0;
            plants = []; bullets = []; particles = []; shockwaves = [];
            hasUsedUlt = false; btnUlt.classList.remove('disabled'); ultNotice.style.display = 'none';
            human.y = GAME_HEIGHT / 2 - 30; moveState.up = false; moveState.down = false;
            gameOverScreen.style.display = 'none'; updateUI(); gameLoop();
        }
    </script>
</body>
</html>
