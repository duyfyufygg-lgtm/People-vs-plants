<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot vs Twisted Goob: Real Forest</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b140b; touch-action: none; font-family: sans-serif; }
        #joy-bg {
            position: absolute; bottom: 50px; left: 40px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; z-index: 10;
        }
        #joy-thumb {
            position: absolute; top: 25px; left: 25px; width: 50px; height: 50px;
            background: #fff; border-radius: 50%; opacity: 0.7;
        }
        #atk-btn {
            position: absolute; bottom: 60px; right: 40px; width: 90px; height: 90px;
            background: rgba(255, 0, 0, 0.8); border: 4px solid #fff; border-radius: 50%;
            color: white; font-weight: bold; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #atk-btn:active { background: #ff0000; transform: scale(0.9); }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; color: white; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">วิ่งหนี Goob ในป่าลึก! | มุ่งหน้าสู่ตึกแดง</div>
    <div id="joy-bg"><div id="joy-thumb"></div></div>
    <div id="atk-btn">ATTACK</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b140b); 
    scene.fog = new THREE.Fog(0x0b140b, 1, 80);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 0.6);
    sunLight.position.set(50, 100, 50);
    scene.add(sunLight);

    const clock = new THREE.Clock();
    const loader = new GLTFLoader();
    
    let player, enemy, playerMixer, goobMixer;
    let playerActions = {}, goobActions = {};
    let isPunching = false;

    // --- 🌳 ระบบปลูกป่าด้วย Tree.glb ---
    loader.load('Tree.glb', (gltf) => {
        const originalTree = gltf.scene;
        for(let i=0; i<80; i++) {
            const treeInstance = originalTree.clone();
            // สุ่มตำแหน่งป่า
            const x = Math.random() * 200 - 100;
            const z = Math.random() * -500;
            treeInstance.position.set(x, 0, z);
            // สุ่มขนาดให้ต้นไม้ดูไม่เหมือนกันเป๊ะ
            const s = 0.5 + Math.random() * 1.5;
            treeInstance.scale.set(s, s, s);
            // สุ่มการหมุน
            treeInstance.rotation.y = Math.random() * Math.PI;
            scene.add(treeInstance);
        }
    });

    // --- โหลด Robot ---
    loader.load('robot.glb', (gltf) => {
        player = gltf.scene;
        scene.add(player);
        playerMixer = new THREE.AnimationMixer(player);
        gltf.animations.forEach(clip => { playerActions[clip.name] = playerMixer.clipAction(clip); });
        playerMixer.addEventListener('finished', () => isPunching = false);
    });

    // --- โหลด Twisted Goob ---
    loader.load('goob.glb', (gltf) => {
        enemy = gltf.scene;
        enemy.position.set(0, 0, -30);
        enemy.scale.set(1.5, 1.5, 1.5);
        scene.add(enemy);
        goobMixer = new THREE.AnimationMixer(enemy);
        gltf.animations.forEach(clip => { goobActions[clip.name] = goobMixer.clipAction(clip); });
        if(gltf.animations[0]) goobActions[gltf.animations[0].name].play();
    });

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 1200), new THREE.MeshStandardMaterial({ color: 0x111b11 }));
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    const exitGate = new THREE.Mesh(new THREE.BoxGeometry(20, 30, 5), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 }));
    exitGate.position.set(0, 15, -490);
    scene.add(exitGate);

    // --- Controls ---
    let move = { x: 0, y: 0 }, active = false;
    const bg = document.getElementById('joy-bg'), thumb = document.getElementById('joy-thumb');
    const handleTouch = (e) => {
        const t = e.touches[0], r = bg.getBoundingClientRect();
        move.x = (t.clientX - (r.left + 50)) / 50;
        move.y = (t.clientY - (r.top + 50)) / 50;
        active = true;
    };
    bg.addEventListener('touchstart', handleTouch);
    bg.addEventListener('touchmove', (e) => { e.preventDefault(); handleTouch(e); }, {passive:false});
    bg.addEventListener('touchend', () => { move = {x:0, y:0}; active = false; thumb.style.transform = 'none'; });

    // --- Attack System ---
    document.getElementById('atk-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        const punch = Object.keys(playerActions)[0];
        if(playerActions[punch] && !isPunching) {
            isPunching = true;
            playerActions[punch].reset().setLoop(THREE.LoopOnce).play();
            if(enemy && player.position.distanceTo(enemy.position) < 8) {
                // ต่อย Goob กระเด็นถอยหลังไปไกลลิบ
                enemy.position.z += 20; 
            }
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const time = performance.now() * 0.001;

        if (playerMixer) playerMixer.update(delta);
        if (goobMixer) goobMixer.update(delta);

        if (player) {
            player.position.x += move.x * 0.35; // เพิ่มสปีดตัวเรานิดนึง
            player.position.z += move.y * 0.35;
            if(active) {
                player.rotation.y = Math.atan2(move.x, move.y) + Math.PI;
                if(!isPunching) {
                    player.position.y = Math.abs(Math.sin(time * 15)) * 0.2;
                    player.rotation.z = Math.sin(time * 15) * 0.05;
                }
            }
            camera.position.set(player.position.x, 6, player.position.z + 12);
            camera.lookAt(player.position.x, 2, player.position.z);
            if(player.position.z < -485) { alert("รอดตายแล้ว!"); location.reload(); }
        }

        if (enemy && player) {
            const dist = enemy.position.distanceTo(player.position);
            enemy.lookAt(player.position.x, 0, player.position.z);

            // --- ปรับ AI ให้ไล่กวดไม่หยุดและไวขึ้น ---
            if (dist < 35) { // ถ้าระยะห่างน้อยกว่า 35 เมตร มันจะพุ่งใส่ทันที
                enemy.translateZ(0.45); // สปีดโหด 0.45 (หนีเหนื่อยแน่นอน)
            } else {
                enemy.translateZ(0.2); // เดินตามช้าๆ
            }

            if (dist < 2.5) location.reload(); // ระยะจับกว้างขึ้นนิดหน่อย
        }
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
